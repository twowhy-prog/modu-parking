name: CPBC 주차장 모니터링

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: credentials.json 생성
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: 주차장 데이터 수집 및 대시보드 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: 대시보드 HTML을 docs 폴더로 복사
        run: |
          mkdir -p docs
          cp modu_dashboard.html docs/index.html

      - name: GitHub에 대시보드 push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "대시보드 업데이트 $(date '+%Y-%m-%d %H:%M')"
          git push