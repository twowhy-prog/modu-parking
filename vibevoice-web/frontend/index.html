<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceStudio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ── 헤더 ─────────────────────────────────── -->
  <header>
    <h1>🎙 Voice<span>Studio</span></h1>
    <span class="subtitle">VibeVoice 기반 TTS</span>
    <span class="spacer"></span>
    <span class="model-badge" id="model-badge">Realtime-0.5B · CPU</span>
  </header>

  <!-- ── 사이드바 (히스토리) ───────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-header">
      📋 히스토리
      <button onclick="newSession()">+ 새 항목</button>
    </div>
    <div id="history-list">
      <div class="empty-history">생성 이력이 없습니다.</div>
    </div>
  </aside>

  <!-- ── 에디터 ─────────────────────────────────── -->
  <main id="editor">
    <div class="editor-toolbar">
      <label>모델</label>
      <select id="model-select">
        <option value="realtime-0.5b">Realtime-0.5B (빠름)</option>
        <option value="multispk-1.5b">MultiSpk-1.5B (고품질)</option>
      </select>

      <label style="margin-left:8px">CFG</label>
      <input type="range" id="cfg-slider" min="1" max="7" step="0.5" value="3"
             oninput="document.getElementById('cfg-val').textContent=parseFloat(this.value).toFixed(1)">
      <span class="cfg-val" id="cfg-val">3.0</span>

      <span class="spacer"></span>

      <button id="btn-generate" onclick="generate()">
        ▶ 음성 생성
      </button>
    </div>

    <div id="segments-container">
      <!-- 세그먼트는 JS로 동적 추가 -->
    </div>

    <button id="btn-add-segment" onclick="addSegment()">
      + 화자 발화 추가
    </button>
  </main>

  <!-- ── 오디오 플레이어 ───────────────────────── -->
  <div id="player">
    <div id="timeline"></div>
    <div class="player-row">
      <button class="player-btn" onclick="seekRel(-5)" title="5초 뒤로">⏮</button>
      <button class="player-btn primary" id="btn-play" onclick="togglePlay()">▶</button>
      <button class="player-btn" onclick="seekRel(5)" title="5초 앞으로">⏭</button>
      <input type="range" id="seek-bar" min="0" max="100" value="0"
             oninput="seekTo(this.value)">
      <span class="time-label" id="time-label">00:00 / 00:00</span>
      <select class="speed-select" onchange="setSpeed(this.value)">
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
      <button class="player-btn save" id="btn-save" onclick="saveAudio()" title="WAV 다운로드" style="display:none">↓</button>
    </div>
  </div>

</div>

<!-- ── 로딩 오버레이 ──────────────────────────── -->
<div id="overlay">
  <div class="spinner"></div>
  <div class="overlay-msg" id="overlay-msg">음성 생성 중...</div>
</div>

<!-- ── 토스트 ─────────────────────────────────── -->
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
